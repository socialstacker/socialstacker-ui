<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Social Stacker</title>
</head>
<body>
    <div class="card">
  <img src="https://assets.codepen.io/1506195/paul-atreides.jpg" alt="" />
  <section>
    <h2>Paul Atreides</h2>
    <p>Duke of House Atreides. Kwisatz Haderach. Lisan al-Gaib. Padishah Emperor.</p>
    <div>
      <div class="tag" aria-label="15 million followers">
        <i class="fa-solid fa-user"></i> 15M
      </div>
      <button>Follow</button>
    </div>
  </section>
</div>

<div class="card dark">
  <img src="https://assets.codepen.io/1506195/paul-atreides.jpg" alt="" />
  <section>
    <h2>Paul Atreides</h2>
    <p>Duke of House Atreides. Kwisatz Haderach. Lisan al-Gaib. Padishah Emperor.</p>
    <div>
      <div class="tag" aria-label="15 million followers">
        <i class="fa-solid fa-user"></i> 15M
      </div>
      <button>Follow</button>
    </div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
